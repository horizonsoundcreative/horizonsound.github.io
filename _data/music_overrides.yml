      <p>[Intro]
      Lights flicker in the Hawkins night,
      Something creeping in the dark just beyond the light.
      Walkie‑talkies hissing keeping them in line,
      And the shadows on the wall feel wrong tonight.</p>
      <p>[Verse 1]
      Mike’s on his bike with a plan he swears is right,
      Dustin’s got the jokes and the gadgets to fight.
      Lucas keeps watch, slingshot held tight,
      And Will hears echoes calling from the other side.
      Eleven’s in the doorway with that far off stare,
      Nosebleed dripping like a psychic flare.
      She whispers softly, “It’s coming… Run!”
      And the streetlights die one by one.</p>
      <p>[Pre‑Chorus]
      Every compass spinning off‑track,
      Every shadow growing hostile,
      Every heartbeat pounding louder than the storm outside…</p>
      <p>[Chorus]
