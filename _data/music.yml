     <p>[Pre‑Chorus]
     So here’s to every long week
     That somehow we survived.</p>
     <p>[Chorus]
     Here’s to us!
     All those that keep going,
     When the going gets tough.
     All those that never give up,
     Here’s to us!
     To the times we thought we’d lose —
     But we somehow made it through.
     So raise ’em up…
     Here’s to us!</p>
