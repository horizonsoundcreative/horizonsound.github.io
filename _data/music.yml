     I’m inchin’ toward the exit,
     prayin’ they don’t block my way,
     Swearin’ up and down I’m innocent —
     But they ain’t buyin’ what I say.</p>
     <p>[Chorus]
     Gimme three steps, boys,
     I ain’t your man.
     Didn’t break your cue,
     didn’t touch your cash.
     I ain’t the guy
     you’re lookin’ for.
     ’Fore this thing blows up—
     gimme three steps,
     and I’m gone.</p>
     <p>[Bridge]
     Maybe I should quit these bars,
     stop dancin’ with girls I don’t know.
     Maybe I should head home early,
     try to straighten out my ways—
     but I’ll end up runnin’ anyway.</p>
     <p>[Chorus]
     Gimme three steps, boys,
     I ain’t your man.
     Didn’t break your cue,
     didn’t touch your cash.
     I ain’t the guy
     you’re lookin’ for.
     ’Fore this thing blows up—
     gimme three steps,
     and I’m gone.</p>
