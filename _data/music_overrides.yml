  - title: Lost in Silence
    song_id: lost-in-silence-from-a-way-back-horizon-sound
    subtitle: A Way Back | Part 1
    collection: a-way-back
    order: 1
    extra_title: null
    extra_html: null
    lyrics_html: |
      <p>[Intro]
      We try so hard, but sometimes love just fades,
      Two honest hearts walking different ways.
      No hard feelings, just a quiet truth—
      Lost in silence, trying to find our way through.</p>
      <p>[Verse 1]
      I’m sitting right beside you,
      but you feel so far away.
      Your eyes are somewhere distant,
      like you’re fading more each day.
      We used to talk forever,
      about all our plans and dreams.
      Now we barely talk at all,
      and neither one of us feels seen.</p>
      <p>[Pre Chorus]
      I see the way you’re hurting.
      Even when you look away.
      I want to reach out and hold you,
      but I just don’t know what to say.</p>
      <p>[Chorus]
      Never heard silence quite so loud.
      Both wanting change,
      Both needing more,
      Both feeling something we can’t ignore.
      Never heard silence quite so loud.
      Both losing ground,
      Both breaking down,
      Neither wants to be the first to say— goodbye.</p>
      <p>[Verse 2]
      I can see you pulling away,
      and I’m not proud of who I’ve been.
      I want to reach out and hold you,
      but I know it’d break me again.
      I miss the nights we’d talk for hours,
      like nothing could pull us apart.
      Now when I try to reach you,
      I can’t find my way to your heart.</p>
      <p>[Pre Chorus]
      I’m trying not to blame you,
      for the words you never said,
      but the absence in your eyes,
      says you’re letting go instead.</p>
      <p>[Chorus]
      Never heard silence quite so loud.
      Both wanting change,
      Both needing more,
      Both feeling something we can’t ignore.
      Never heard silence quite so loud.
      Both losing ground,
      Both breaking for the last time,
      So we finally say— goodbye.</p>
      <p>[Outro]
      We’re moving on, and maybe that’s alright,
      Two honest hearts stepping into new light.
      No hard feelings, just a quiet release—
      And we’re both finding our own kind of peace.</p>
  - title: All Around the World
    song_id: all-around-the-world-acoustic-pop-horizon-sound
    subtitle: ''
    collection: null
    order: null
    extra_title: null
    extra_html: null
    lyrics_html: |
      <p>[Verse]
      You say the world is a place to explore,
      You get a thrill from the race and the roar.
      Then you’re in it,
      We’re so in it…
      Then suddenly you leave—
      A summer you swore you’d never forget,
      When fall comes around, you don’t feel it yet.
      How do I take that?
      I’m so displaced now,
      When you leave me.</p>
      <p>[Chorus]
      You know
      I can't see all around the world
      Can't see all around the world without you
      (All around the world)
      Can't see all around the world
      You know
      I can't see all around the world
      Can't see all around the world without you
      (All around the world)
      Can't see all around the world</p>
      <p>[Verse]
      I have a routine when I put on my face,
      Try to cover it up so I don’t look the same.
      Then it’s foundation,
      Eyes,
      Lips…
      Then I’m brand new.
      But you show up saying, “Hey,
      I’ve got someone in mind for you today —
      The one you think of
      All of the time,
      Who would take you out,
      Who would treat you right…
      The way he should.”</p>
      <p>[Bridge]
      Maybe I was chasing you too far,
      Running circles ’round your shooting star.
      But every place you showed me how to see
      Is still a map that leads me back to me.</p>
      <p>[Chorus]
      You know
      I can see all around the world,
      But it’s different than it was with you.
      (All around the world)
      I’m learning what is true.
      You know
      I can see all around the world,
      Even if I miss the view I knew.
      (All around the world)
      I’m finding something new.</p>
      <p>[Outro]
      All around the world…
      I’m still moving.
      All around the world…
      I’m still choosing.
      All around the world…
      I’m finding me.</p>
  - title: After the Silence
    song_id: 9-after-the-silence-performed-by-lydia-ellington-after-the-silence-horizon-sound
    subtitle: After the Silence | Part 9
    collection: after-the-silence
    order: 9
    extra_title: null
    extra_html: null
    lyrics_html: |
      <p>[Verse 1]
      The storm has finally faded,
      Left a quiet in its wake.
      All the words we left unspoken
      Start to rise and resonate.
      Now I’m standing in the stillness
      Where the wreckage used to be —
      And in the space you left behind,
      I feel a softer part of me.</p>
      <p>[Pre‑Chorus]
      I’ve been learning how to breathe again
      In a world that doesn’t feel the same.</p>
      <p>[Chorus]
      After the silence…
      I can hear my heartbeat steady for the first time in a while.
      There’s a softness in the quiet that I never thought I’d find again.
      After the silence…
      I’m not who I was before I fell,
      But I’m stronger than the pieces of it all.
      And I’m finally finding light again…
      After the silence.</p>
      <p>[Verse 2]
      I trace the cracks along the walls —
      Every fracture tells the truth.
      I was trying to hold my world together
      Even though I was breaking inside.
      But now the calm is settling
      Like a blanket on my skin —
      And in the quiet of this moment,
      I feel something new begin.</p>
      <p>[Pre‑Chorus]
      I’m still learning how to trust myself,
      But I’m standing on my own.</p>
      <p>[Chorus]
      After the silence…
      I can hear my heartbeat steady for the first time in a while.
      There’s a softness in the quiet that I never thought I’d find again.
      After the silence…
      I’m not who I was before I fell,
      But I’m stronger than the pieces of it all.
      And I’m finally finding light again…
      After the silence.</p>
      <p>[Bridge]
      Maybe healing isn’t sudden,
      Maybe peace is slow to rise.
      Maybe strength is just the courage
      To sit with what survived.
      But in the hush that fills this room,
      In the calm that meets my eyes —
      I feel the world returning
      One small breath at a time.</p>
      <p>[Final Chorus]
      After the silence…
      I can hear my own voice calling from a place I thought was gone.
      There’s a warmth inside the quiet where the hurt can’t linger on.
      I’m not who I was before I fell,
      But I’m learning I don’t need to be.
      And I’m finally stepping into light again…
      After the silence.</p>
      <p>[Outro]
      The quiet feels unfamiliar…
      But it’s starting to feel like mine.</p>
  - title: Ghostlight
    song_id: 8-ghostlight-performed-by-lydia-ellington-after-the-silence-horizon-sound
    subtitle: After the Silence | Part 8
    collection: after-the-silence
    order: 8
    extra_title: null
    extra_html: null
    lyrics_html: |
      <p>[Intro]
      One light left on the stage…
      Still shining where you used to stand</p>
      <p>[Verse 1]
      I walk across these worn‑out floorboards,
      Feel the echo of your soul.
      Every word you ever whispered
      Still hangs heavy in the cold.
      I keep the bulb burning softly —
      It’s a promise I can’t shake.
      A little glow for all the moments
      That the darkness couldn’t take.</p>
      <p>[Pre‑Chorus]
      My mind knows you’re gone, but
      My heart still feels you waiting in the wings.</p>
      <p>[Chorus]
      You’re my ghostlight —
      The little flame I leave on when the world slips into night.
      A quiet glow that illuminates the space
      Where your memory still fills the place.
      I know you won’t be walking in,
      But I can’t let the darkness win.
      So I keep it burning bright…
      My ghostlight.</p>
      <p>[Verse 2]
      I’ve tried to close the curtains slowly,
      Tried to sweep this stage of you.
      But the dust keeps rising softly,
      Tracing all we couldn’t do.
      And though the seats are cold and empty,
      I replay the lines we wrote —
      Every laugh and every heartbreak
      Still rehearsed in every note.</p>
      <p>[Pre‑Chorus]
      I know the show is over,
      But I can’t dim what still remains.</p>
      <p>[Chorus]
      You’re my ghostlight —
      The little flame I leave on when the world slips into night.
      A quiet glow that illuminates the space
      Where your memory still fills this place.
      I know you won’t be walking in,
      But I can’t let the darkness win.
      So I keep it burning bright…
      My ghostlight.</p>
      <p>[Bridge]
      Maybe someday I’ll switch it off
      And let the shadows have their turn.
      Maybe someday I’ll walk away
      From all the things that still burn.
      But tonight I need the comfort
      Of the glow you left behind —
      A single light to guide me
      Through all the corners of my mind.</p>
      <p>[Final Chorus]
      You’re my ghostlight —
      Still shining brightly while I’m learning to be alright.
      A quiet flame that anchors this place
      Where I loved you more than time or space.
      I can feel you won’t be back again,
      But letting go takes strength I still don’t have
      So I’ll keep it burning bright…
      My ghostlight.</p>
      <p>[Outro]
      One light left on the stage…
      Waiting for the day I’m ready to let go.</p>
  - title: If You'd Asked
    song_id: 7-if-youd-asked-performed-by-lydia-ellington-after-the-silence-horizon-sound
    subtitle: After the Silence | Part 7
    collection: after-the-silence
    order: 7
    extra_title: null
    extra_html: null
    lyrics_html: |
      <p>[Intro]
      I keep replaying the moment
      When you let go without a word</p>
      <p>[Verse 1]
      You said you didn’t want to hurt me,
      So you walked away instead.
      You left the questions on the table,
      And the words you left unsaid.
      I was waiting for a reason,
      For a sign you’d change your mind —
      But you never turned around,
      Never gave us one more try.</p>
      <p>[Pre‑Chorus]
      And I wonder if you ever knew
      How close I was to choosing you.</p>
      <p>[Chorus]
      If you’d asked…
      I would’ve stayed,
      I would’ve fought, I would’ve held you through the fall.
      If you’d asked…
      I would’ve tried to change, tried to bring the fire back.
      But you never said a word,
      Never let me heal the hurt.
      You just left me in the past…
      If only you’d asked.</p>
      <p>[Verse 2]
      I rehearsed all the answers
      To the questions you never asked.
      I was ready for the hard work,
      To rebuild what we had.
      But you made the choice in silence,
      Closed the door without a sound —
      And the stillness in that moment
      Told me you were truly gone.</p>
      <p>[Pre‑Chorus]
      And I wonder if you ever knew
      How close I was to choosing you.</p>
      <p>[Chorus]
      If you’d asked…
      I would’ve stayed,
      I would’ve fought, I would’ve held you through the fall.
      If you’d asked…
      I would’ve tried to change, tried to bring the fire back.
      But you never said a word,
      Never let me heal the hurt.
      You just left me in the past…
      If only you’d asked.</p>
      <p>[Bridge]
      Maybe you were afraid to need me,
      Maybe your pride got in the way.
      Maybe loving me was too much,
      More than you could ever say.
      But I would’ve carried it all,
      If you’d only let me try —
      You’ll never know a time
      Where we didn’t say goodbye.</p>
      <p>[Chorus]
      If you’d asked…
      I would’ve stayed, I would’ve fought, I would’ve held you through the cracks.
      If you’d asked…
      I would’ve changed the things you needed, tried to bring the fire back.
      But you never said a word,
      Never let me heal the hurt.
      Now I’m learning to let go at last…
      Of what we lost
      When you never asked.</p>
      <p>[Outro]
      You never asked…
      So I walked away…</p>
  - title: Half of Me
    song_id: 6-half-of-me-performed-by-lydia-ellington-after-the-silence-horizon-sound
    subtitle: After the Silence | Part 6
    collection: after-the-silence
    order: 6
    extra_title: null
    extra_html: null
    lyrics_html: |
      <p>[Intro]
      I sacrificed my edges
      Just to fit inside your lines</p>
      <p>[Verse 1]
      I molded myself to you,
      Softened every part you touched.
      Tried to be the calm you needed,
      Even when it hurt too much.
      I forgot the sound of laughter,
      Lost the person I used to be —
      Till the mirror showed a stranger
      Who was tired of holding on.</p>
      <p>[Pre‑Chorus]
      But something in me is waking,
      The version I long to be.</p>
      <p>[Chorus]
      You only ever loved half of me —
      The part that bent so you could breathe.
      But now I’m finding in me what you couldn’t see,
      The fire I buried deep inside.
      I’m taking back the space I need,
      No longer shrinking just to make you feel strong.
      I’m done being who you wanted me to be…
      You only loved half of me.</p>
      <p>[Verse 2]
      I used to fear the quiet moments,
      It’s when I replayed all my hurt.
      But now I see my own reflection,
      Feel the beating of my heart.
      I’m rebuilding all the pieces
      That crumbled when I tried to stay —
      And the woman I’m becoming
      Would be the first to walk away.</p>
      <p>[Pre‑Chorus]
      My power’s coming from breaking,
      From choosing who I am at last.</p>
      <p>[Chorus]
      You only ever loved half of me —
      The part that bent so you could breathe.
      But now I’m finding in me what you couldn’t see,
      The fire I buried deep inside.
      I’m taking back the space I need,
      No longer shrinking just to make you feel strong.
      I’m done being who you wanted me to be…
      You only loved half of me.</p>
      <p>[Bridge]
      So I’m done apologizing
      For the parts you couldn’t see.
      I’m done with being quiet
      Just to fit inside your lines.
      I’m rising slow and steady
      Into who I’m meant to be —</p>
      <p>[Final Chorus]
      You only ever loved half of me —
      But now I’m embracing all the things
      you never let me be.
      Now I’m shining fearlessly,
      A brighter, bolder melody.
      I’m taking back the space I need,
      No longer shrinking just to make you feel strong.
      I’m finally who I’m meant to be…
      And you can’t have half of me.</p>
      <p>[Outro]
      I’m whole again…
      And I will never turn back.</p>
  - title: Paper Walls
    song_id: 5-paper-walls-performed-by-lydia-ellington-after-the-silence-horizon-sound
    subtitle: After the Silence | Part 5
    collection: after-the-silence
    order: 5
    extra_title: null
    extra_html: null
    lyrics_html: |
      <p>[Intro]
      I built them up so carefully…
      But they never stood a chance</p>
      <p>[Verse 1]
      I filled every crack with hope,
      Painted strength on every side.
      Told the world I didn’t need you,
      Held my breath and hoped they’d see
      All the armor I’d imagined,
      All the lies I tried to sell —
      But the truth was in the trembling
      Every time you met my eyes.</p>
      <p>[Pre‑Chorus]
      One word and I was breaking,
      One touch and I came undone.</p>
      <p>[Chorus]
      ’Cause these paper walls
      Look strong until you lean on them at all.
      One breath, and they fall apart,
      Scattering the pieces of my guarded heart.
      I tried so hard to stand up tall,
      But I was never built to bear that weight.
      You saw right through it all…
      My paper walls.</p>
      <p>[Verse 2]
      I tucked away each fear so neatly,
      Stacked them where you couldn’t see.
      Thought if I could hide the fragile,
      You might stay a while with me.
