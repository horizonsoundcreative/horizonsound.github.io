      <p>[Intro]
      “Last call!” echoes through the crowd.
      People grabbing jackets, stumbling out,
      Lights come up, DJ kills the sound,
      After midnight, yeah, the end is near.</p>
      <p>[Verse 1]
      Broke a heel dancing, had to take off my shoes.
      Lost my phone twice, blamed it on the booze.
      Bathroom line was torture, someone’s lying on the floor.
      But we’re laughing now harder than ever before.</p>
      <p>[Pre‑Chorus]
      The night air hits us as we stumble outside,
      Mascara smudged from the heat of the lights.
      Someone shouts “Denny’s!” and we all agree—
      After midnight, that’s the place to be.</p>
      <p>[Chorus]
      After midnight, the party slows down,
      Swagger fades out as we start to come down.
      Uber’s coming, and we’re losing our minds,
      Every messy moment, proof that we’re alive.
      After midnight, the world goes dark,
      City lights dim as the rush wears off.
      We’re exhausted, but we’re still alive—
      Yeah, the best stories happen after midnight.</p>
      <p>[Verse 2]
      Uber pulls up, and we tumble inside,
      Laughing at all the selfies posted tonight.
      Someone finds her phone in another girl’s purse,
      Someone’s flirting with the driver, too buzzed to care.</p>
      <p>[Pre‑Chorus]
      Booth lights glowing like a warm embrace,
      Fries on the table, glitter clinging to our face.
      We replay the chaos like a highlight reel—
      After midnight, everything feels right.</p>
      <p>[Chorus]
      After midnight, the party slows down,
      Swagger fades out as we start to come down.
      Uber’s coming, and we’re losing our minds,
      Every messy moment, proof that we’re alive.
      After midnight, the world goes dark,
      City lights dim as the rush wears off.
      We’re exhausted, but we’re still alive—
      Yeah, the best stories happen after midnight.</p>
      <p>[Bridge]
      We’ll forget the songs but remember the glow,
      The glitter, the chaos, the friends we know.
      These are the nights we’ll miss someday—
      Time with my girls that will never fade.</p>
      <p>[Chorus]
      After midnight, the party slows down,
      Swagger fades out as we start to come down.
      Uber’s coming, and we’re losing our minds,
      Every messy moment, proof that we’re alive.
      After midnight, the world goes dark,
      City lights dim as the rush wears off.
      We’re exhausted, but we’re still alive—
      Yeah, the best stories happen after midnight.</p>
      <p>[Outro]
      After midnight, the noise fades away,
      Uber pulls up, it’s time to go home,
      Shoes in our hands, still buzzing from the night.
      One by one, the girls say goodnight—
      After midnight, I breathe again—
      Yeah, this is how the best nights end.</p>
