      <p>[Intro]
      Another day, another story,
      In this little bar in this little town.
      Unlock the door and turn on the jukebox,
      the neon OPEN sign in the window starts to glow.</p>
      <p>[Verse 1]
      I wipe down the bar same way I do each day,
      Sweep the floor and stock the cooler, clean last night’s dust away.
      My coffee in a paper cup, the jukebox humming low,
      And right on time in walks Joe, like he always does at four.</p>
      <p>[Verse 2]
      I’m polishing a whiskey glass while he tells me ’bout his wife,
      Says he misses how she laughed at him, but it’s easing with the nights.
      Then Mary from the hardware store stops in to catch her breath,
      Says this bar’s the only place she feels she ain’t alone with all her stress.</p>
      <p>[Chorus]
      ’Cause I pour the drinks, but they pour out their hearts,
      Stories flow as steady as the beer.
      I’m the one who keeps the lights on,
      And the one who’s always here.
      Yeah, this place is more than liquor,
      It’s a home for broken hearts and brand‑new starts.
      And I thank the Lord each evening
      For the life I’m living
      As the man behind the bar.</p>
      <p>[Verse 3]
      Some nights it’s loud and rowdy, some nights it’s quiet as a prayer,
      But either way I’m listening while pretending not to stare.
      A bartender should stay busy — that’s a rule I learned real fast,
      So I keep wiping down the counter while their troubles come to pass.</p>
      <p>[Bridge]
      I ain’t a preacher or a doctor,
      But I’ve seen healing in this room.
      Sometimes all a soul really needs
      Is a friendly ear and a stool.</p>
      <p>[Chorus]
      ’Cause I pour the drinks, but they pour out their hearts,
      Stories flow as steady as the beer.
      I’m the one who keeps the lights on,
      And the one who’s always here.
      Yeah, this place is more than liquor,
      It’s a home for broken hearts and brand‑new starts.
      And I can’t imagine ever
      Doing anything better
      Than being the man behind the bar.</p>
      <p>[Outro]
      So I turn that neon OPEN sign to dark,
      Lock the door and kill the sound…
      Another day, another story,
      In this little bar in this little town.</p>
