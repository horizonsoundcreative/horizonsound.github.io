   lyrics_html: |
     <p>[INTRO]
     Turn around…
     Every now and then I think about how close I came to breaking—
     Turn around…
     And every now and then it hits me how far I’ve finally come.</p>
     <p>[VERSE 1]
     I remember how it felt then,
     Every instinct telling me to flee,
     You were a wildfire on the horizon,
     A heat that swallowed me.
     I kept losing all my courage,
     Too afraid to stand on my own.
     I was breaking just to keep you,
     Terrified of facing life alone.
     But time has a way of showing
