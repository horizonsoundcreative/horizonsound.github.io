    description_html: >-
      <p>Official audio for "Already Out the Door" by Horizon
      Sound.</p><p>“Already Out the Door” is a modern country heartbreak story
      built on warm acoustic guitars, steady mid‑tempo drums, and clean
      Nashville‑style electric fills. An emotional male lead vocal carries the
      song with sincerity and restraint, avoiding exaggerated twang while
      leaning into a wounded, reflective tone. Smooth harmonies bloom only in
      the chorus, adding lift without overshadowing the intimacy of the verses.
      The production is polished, spacious, and subtly atmospheric, letting the
      storytelling take center stage.</p><p>This song captures the quiet
      devastation of realizing trust is gone — the late‑night waiting, the phone
      location that tells the truth, and the moment a relationship breaks
      without a single raised voice. Honest, grounded, and deeply human,
      “Already Out the Door” is a modern country confession for anyone who’s
      stayed too long, hoped too hard, and finally walked away with nothing left
      to give.</p><ul class="vibe-list"><li>🎧 Vibe: modern country, mid‑tempo,
