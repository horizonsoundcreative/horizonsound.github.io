      6. Half of Me – Performed by Lydia Ellington (After the Silence) | Horizon
      Sound
    description_html: >-
      <p>Official audio for “Half of Me” by Horizon Sound.</p><p>“Half of Me” is
      an empowering emotional pop ballad built on warm expressive female vocals,
      bold piano, rising strings, steady drums, and a cinematic lift that grows
      stronger with every chorus. It’s a self‑reclaiming anthem — the moment
      someone stops shrinking themselves to fit inside someone else’s
      expectations.</p><p>The song follows a woman who softened her edges,
      quieted her voice, and reshaped herself to keep a love that never saw her
      fully. She bent until she broke, losing the person she used to be. But as
      she rebuilds, she discovers the fire she buried deep inside — the part of
      her that refuses to stay small. “Half of Me” is the sound of taking back
      space, rediscovering strength, and choosing authenticity over
      approval.</p><ul class="vibe-list"><li>🎧 Vibe: rising, bold,
      emotional</li><li>🎤 Vocals: warm female lead, expressive phrasing,
      powerful lift</li><li>🎛️ Production: piano, warm strings, steady drums,
