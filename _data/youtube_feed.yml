    description_html: >-
      <p>Official audio for "Until the Nightmare Ends" by Horizon
      Sound.</p><p>"Until the Nightmare Ends" is a cinematic 80s‑inspired
      synthwave track built for fans of dark nostalgia, neon tension, and the
      Stranger Things universe. Pulsing bass, airy pads, dramatic tom fills, and
      widescreen synths drive this emotional, story‑driven song about
      friendship, fear, and fighting back when the shadows close in.</p><p>This
      track blends retro synthwave, cinematic scoring, and anthemic pop‑rock
      energy—complete with electric‑guitar accents, rising atmospheric verses,
      and a huge, heroic chorus. The vocals carry the emotional weight of
      Hawkins: fear, loyalty, and the unbreakable bond that keeps the crew
      standing together even when the sky turns red.</p><p>---</p><p>🎧 About
      the Song</p><p>Until the Nightmare Ends follows the Hawkins crew through
      flickering streetlights, psychic warnings, Demogorgon attacks, and Vecna’s
      rising threat. Each verse spotlights different characters—Mike, Eleven,
      Max, Hopper, Nancy, Steve, and more—while the chorus becomes a rallying
      cry: stand together, fight back, and hold the line until the nightmare
      ends.</p><p>---</p><p>🎵 More from Horizon Sound</p><p>• Pop <a
