<script>
document.addEventListener("DOMContentLoaded", () => {

  function bindInternalLinks(scope = document) {
    scope.querySelectorAll("a").forEach(link => {
      console.log("SPA CHECK:", link, "href:", link.getAttribute("href"));

      if (link.dataset.spaBound === "true") return;

      const href = link.getAttribute("href");
      if (!href) return;

      if (href.startsWith("mailto:") || href.startsWith("tel:")) return;
      if (href.startsWith("#")) return;

      const url = new URL(link.href);
      if (url.origin !== window.location.origin) {
        console.log("SPA SKIP (external):", link.href);
        return;
      }

      console.log("SPA BIND:", link.href);
      link.dataset.spaBound = "true";

      link.addEventListener("click", async (e) => {
        e.preventDefault();

        const response = await fetch(url, { credentials: "same-origin" });
        const html = await response.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");
        const newMain = doc.querySelector("main");

        const oldMain = document.querySelector("main");
        oldMain.replaceWith(newMain);
        history.pushState({}, "", url);

        const scripts = newMain.querySelectorAll("script");
        scripts.forEach(oldScript => {
          if (oldScript.src) return; // Skip external scripts
        
          const s = document.createElement("script");
          s.textContent = oldScript.textContent;
          document.body.appendChild(s);
        });

        // Re-bind links globally
        bindInternalLinks(document);

        if (typeof initCatalogPage === "function") initCatalogPage();
        if (typeof onYouTubeIframeAPIReady === "function") onYouTubeIframeAPIReady();
      });
    });
  }

  // Initial bind
  bindInternalLinks(document);
});
</script>
