  description: >-
    Official audio for “Ghostlight” by Horizon Sound.


    “Ghostlight” is a haunting, theatrical emotional pop ballad built around
    warm expressive female vocals, soft piano, warm strings, subtle percussion,
    and atmospheric reverb. It glows with the feeling of a memory that refuses
    to fade — a single light left burning for someone who’s no longer there.


    The song follows a woman walking through the remnants of a love that still
    echoes in every corner. She keeps a small light burning, a symbolic glow for
    the moments the darkness couldn’t erase. Even though she knows the show is
    over, she can’t bring herself to dim the last reminder of what once filled
    the room. “Ghostlight” captures the beauty and ache of holding on to the
    last flicker of someone’s presence.


    🎧 Vibe: haunting, glowing, cinematic

    🎤 Vocals: warm female lead, rich tone, emotional phrasing

    🎛️ Production: soft piano, warm strings, subtle percussion, atmospheric
