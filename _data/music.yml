   description_html: |
     <p><strong>Official audio for “Kaleidoscope” by Horizon Sound.</strong></p>
     <p>“Kaleidoscope” is a warm, heartfelt acoustic‑pop track built on gentle piano, light guitar, and intimate female vocals. The production stays soft and modern, letting the lyrics shine as they explore resilience, shifting perspectives, and the beauty that emerges when life refuses to stay still. Subtle percussion and airy harmonies lift the chorus into a hopeful, melodic rise, creating a comforting, introspective soundscape.</p>
     <p>This song follows the journey of someone learning to embrace change instead of fearing it. Each verse reflects on the moments when life tilts, breaks, or rearranges itself into something unexpected. Through fractured pieces, fading seasons, and new patterns forming over time, she discovers that motion doesn’t mean chaos — it means growth. “Kaleidoscope” captures the quiet courage of letting go, breathing through uncertainty, and trusting that every turn brings a new kind of light.</p>
     <p>🎧 <strong>Vibe:</strong> emotional acoustic‑pop, warm, reflective, uplifting
     🎤 <strong>Vocals:</strong> intimate female lead, expressive phrasing, soft harmonies
     🎛️ <strong>Production:</strong> piano‑led, light acoustic guitar, gentle percussion, modern singer‑songwriter polish
     ⚡ <strong>Mood:</strong> hopeful, introspective, poetic, quietly empowering</p>
   lyrics_html: |
     <p>[Verse 1]
     I used to fear change, I tried to keep it still
     Worried every bad decision meant I’d never find my way
     But nothing stays the same, and maybe that’s ok
     The colors only come alive when patterns start to play</p>
     <p>[Pre Chorus]
     So when the world tilts sideways
     And I don’t know what comes next
     I remind myself that motion
     Doesn’t mean my life’s a mess</p>
     <p>[Chorus]
     Life’s a kaleidoscope, changing with each day
     Every shape and color shifting into place
     When the bright goes dark, when everything falls apart
     I just breathe and let it go
     Every day… another turn of the kaleidoscope</p>
     <p>[Verse 2]
     I’ve seen the best things fade, and the worst things bloom
     Lost a little faith, then found it in a different view
     The things that once hurt me now fall into a new design
     Sometimes the fractured pieces form a pattern over time</p>
     <p>[Pre Chorus]
     So when my vision trembles
     And the colors rearrange
     I remind myself that happiness
     sometimes needs a little change</p>
     <p>[Chorus]
     Life’s a kaleidoscope, changing with each day
     Every shape and color shifting into place
     When the bright goes dark, when everything falls apart
     I just breathe and let it go
     Every day… another turn of the kaleidoscope</p>
     <p>[Bridge]
     You can’t freeze the perfect moment
     You often stay inside the pain
     Every turn becomes a chance
     Every flicker finds its flame
     And the light keeps finding new ways
     To start to shine through</p>
     <p>[Chorus]
     Life’s a kaleidoscope, changing with each day
     Every shape and color shifting into place
     When the bright goes dark, when everything falls apart
     I just breathe and let it go
     Every day… another turn of the kaleidoscope</p>
     <p>[Outro]
     Every day… another turn of the kaleidoscope</p>
