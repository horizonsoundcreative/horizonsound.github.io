<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    window.__REPO_NAME__ = "{{ site.github.repository_name }}";
  </script>
  
  {% if site.github.repository_name == "development" %}
    <meta name="robots" content="noindex, nofollow">
  {% endif %}

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const robotsMeta = document.querySelector('meta[name="robots"]');
      const repo = window.__REPO_NAME__;

      if (robotsMeta) {
        const content = robotsMeta.getAttribute('content');
        if (content.includes('noindex') && repo !== "development") {
          document.documentElement.style.background = "blue";
          document.body.style.background = "blue";
        }
      }
    });
  </script>
  <script src="{{ site.baseurl }}/assets/js/autoplay.js"></script>

  <meta charset="UTF-8" />
  <title>{{ page.title }}</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JFDRHKE5CW"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-JFDRHKE5CW');
  </script>

  <link rel="stylesheet" href="{{ site.baseurl }}/style-v2.css?v=0" />
</head>

  <body>
  <script>
    if ('scrollRestoration' in history) {
      history.scrollRestoration = 'manual';
    }
    window.scrollTo(0, 0);
  </script>
    {% include header.html %}

  
    <div id="page-root">
      <main>
        {{ content }}
      </main>
    </div>
    
    {% include footer.html %}
  </body>
</html>
