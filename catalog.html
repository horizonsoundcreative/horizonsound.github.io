{% assign all_songs = site.data.youtube_feed.songs %}
{% include hero.html %}

<div class="music-page">
  <div class="catalog-panel">

    <!-- HEADER -->
    <div class="catalog-header">
    
      <!-- ROW 1 -->
      <div class="catalog-header-row">
        <div class="catalog-toggle">
          <button class="mode-toggle-button active" data-mode="playlists">Collection Explorer</button>
          <button class="mode-toggle-button" data-mode="catalog">Catalog Explorer</button>
        </div>
    
        <h2 class="page-title">Collection Explorer</h2>
    
        <div class="catalog-header-spacer"></div>
      </div>
    
      <!-- ROW 2 -->
      <div class="catalog-subtoggle">
        <button class="view-toggle-button active" data-view="grouped">Grouped by View</button>
        <button class="view-toggle-button" data-view="all">All Music View</button>
        <button class="view-toggle-button" data-view="carousel">Carousel View</button>
      </div>
    
    </div>

    <!-- MAIN CONTENT -->
    <div class="catalog-content">
      <section id="music-view-playlists">
        <h2 class="section-header">Collection Explorer</h2>
      </section>

      <section id="music-view-catalog" style="display:none;">
        <section id="music-view-playlists">
          <h2 class="section-header">Catalog Explorer</h2>
        </section>

        <section id="music-view-grouped"></section>
          <section id="music-view-playlists">
            <h2 class="section-header">Catalog Grouped View</h2>
          </section>
        
        <section id="music-view-all" style="display:none;"></section>
          <section id="music-view-playlists">
            <h2 class="section-header">Catalog All Music View</h2>
          </section>
    
        <section id="music-view-carousel" style="display:none;"></section>
          <section id="music-view-playlists">
            <h2 class="section-header">Catalog Carousel View</h2>
          </section>

        <script>
        /* JS unchanged */
        </script>

      </section>

    </div><!-- catalog-content -->

  </div><!-- catalog-panel -->
</div><!-- music-page -->

  <script>
  document.addEventListener("DOMContentLoaded", () => {
    const main = document.querySelector("main");
  
    // Intercept all playlist links on the Music page
    document.querySelectorAll('a[href*="/music/playlists/"]').forEach(link => {
      link.addEventListener("click", async (event) => {
        event.preventDefault();
  
        const url = link.href;
  
        // Fetch the playlist page HTML
        const response = await fetch(url, { credentials: "same-origin" });
        const text = await response.text();
  
        // Parse the HTML
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, "text/html");
  
        // Extract the new <main> content
        const newMain = doc.querySelector("main");
        if (!newMain) {
          window.location.href = url; // fallback
          return;
        }
  
        main.replaceWith(newMain);
        history.pushState({}, "", url);
    
    // Execute scripts AFTER the DOM has parsed the new <main>
    setTimeout(() => {
      newMain.querySelectorAll("script").forEach(oldScript => {
        const newScript = document.createElement("script");
    
        if (oldScript.src) {
          newScript.src = oldScript.src;
        } else {
          newScript.textContent = oldScript.textContent;
        }
    
        document.body.appendChild(newScript);
        document.body.removeChild(newScript);
      });
    }, 0);
  
    // Handle back/forward navigation
    window.addEventListener("popstate", async () => {
      const url = window.location.href;
      const response = await fetch(url, { credentials: "same-origin" });
      const text = await response.text();
  
      const parser = new DOMParser();
      const doc = parser.parseFromString(text, "text/html");
      const newMain = doc.querySelector("main");
  
      if (newMain) {
        document.querySelector("main").replaceWith(newMain);
  
        const script = newMain.querySelector("script");
        if (script) {
          eval(script.innerText);
        }
      }
    });
  });
  </script>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  /* -----------------------------
     TOP-LEVEL MODE RESTORE
     (Playlist vs Catalog)
  ----------------------------- */
  const playlistView = document.getElementById("music-view-playlists");
  const catalogView = document.getElementById("music-view-catalog");
  const modeButtons = document.querySelectorAll(".mode-toggle-button");

  const savedMode = localStorage.getItem("music_mode") || "playlists";

  if (savedMode === "catalog explorer") {
    playlistView.style.display = "none";
    catalogView.style.display = "block";
    modeButtons.forEach(b => b.classList.remove("active"));
    document.querySelector('[data-mode="catalog"]').classList.add("active");
  document.querySelector(".catalog-subtoggle").style.display = "flex";
  document.querySelector(".page-title").textContent = "Catalog Explorer";
  } else {
    playlistView.style.display = "block";
    catalogView.style.display = "none";
    modeButtons.forEach(b => b.classList.remove("active"));
    document.querySelector('[data-mode="playlists"]').classList.add("active");
  document.querySelector(".catalog-subtoggle").style.display = "none";
  document.querySelector(".page-title").textContent = "Collection Explorer";
  }

  /* -----------------------------
     TOP-LEVEL MODE CLICK HANDLER
  ----------------------------- */
  modeButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      modeButtons.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      const mode = btn.dataset.mode;

      if (mode === "collection explorer") {
        playlistView.style.display = "block";
        catalogView.style.display = "none";
        // UPDATE TITLE
        document.querySelector(".page-title").textContent = "Collection Explorer";
        document.querySelector(".catalog-subtoggle").style.display = "none";
      } else {
        playlistView.style.display = "none";
        catalogView.style.display = "block";
        // UPDATE TITLE
        document.querySelector(".page-title").textContent = "Catalog Explorer";
        document.querySelector(".catalog-subtoggle").style.display = "flex";
      }

      localStorage.setItem("music_mode", mode);
    });
  });
  
  /* -----------------------------
     CATALOG SUB-VIEW RESTORE
     (Grouped / All / Carousel)
  ----------------------------- */
  const groupedView = document.getElementById("music-view-grouped");
  const allSongsView = document.getElementById("music-view-all");
  const carouselView = document.getElementById("music-view-carousel");
  const viewButtons = document.querySelectorAll(".view-toggle-button");

  const savedCatalogView = localStorage.getItem("catalog_view") || "grouped";

  groupedView.style.display = (savedCatalogView === "grouped") ? "block" : "none";
  allSongsView.style.display = (savedCatalogView === "all") ? "block" : "none";
  carouselView.style.display = (savedCatalogView === "carousel") ? "block" : "none";

  viewButtons.forEach(b => b.classList.remove("active"));
  document.querySelector(`[data-view="${savedCatalogView}"]`).classList.add("active");

  /* -----------------------------
     CATALOG SUB-VIEW CLICK HANDLER
  ----------------------------- */
  viewButtons.forEach(button => {
    button.addEventListener("click", () => {
      viewButtons.forEach(b => b.classList.remove("active"));
      button.classList.add("active");

      const view = button.dataset.view;

      groupedView.style.display = (view === "grouped") ? "block" : "none";
      allSongsView.style.display = (view === "all") ? "block" : "none";
      carouselView.style.display = (view === "carousel") ? "block" : "none";

      localStorage.setItem("catalog_view", view);
    });
  });
});
</script>

<script>
document.querySelectorAll('.playlist-premium-tile, .tile').forEach(tile => {
  tile.addEventListener('click', async (e) => {
    if (tile.classList.contains('coming-soon')) return;

    e.preventDefault(); // stop full page reload

    const url = tile.getAttribute('href');

    // Fetch the playlist page HTML
    const response = await fetch(url, { credentials: 'same-origin' });
    const html = await response.text();

    // Replace the entire <main> content with the new page
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const newMain = doc.querySelector('main');

    document.querySelector('main').replaceWith(newMain);

    // Update the URL without reloading
    history.pushState({}, "", url);

    // Re-run the playlist page scripts
    const scripts = newMain.querySelectorAll("script");
    scripts.forEach(oldScript => {
      const s = document.createElement("script");
      if (oldScript.src) {
        s.src = oldScript.src;
      } else {
        s.textContent = oldScript.textContent;
      }
      document.body.appendChild(s);
    });
  });
});
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll('a').forEach(link => {
    const href = link.getAttribute('href');
    if (!href) return;

    // Only intercept internal navigation
    const isInternal =
      href.startsWith('{{ site.baseurl }}/music') ||
      href === '{{ site.baseurl }}/' ||
      href === '{{ site.baseurl }}' ||
      href === '/' ||
      href === '/index.html'; ||
      href === '/about.html';

    if (!isInternal) return;

    link.addEventListener('click', async (e) => {
      e.preventDefault();

      const url = link.href;

      const response = await fetch(url, { credentials: 'same-origin' });
      const html = await response.text();

      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const newMain = doc.querySelector('main');

      document.querySelector('main').replaceWith(newMain);
      history.pushState({}, "", url);

      const scripts = newMain.querySelectorAll("script");
      scripts.forEach(oldScript => {
        const s = document.createElement("script");
        if (oldScript.src) {
          s.src = oldScript.src;
        } else {
          s.textContent = oldScript.textContent;
        }
        document.body.appendChild(s);
      });
    });
  });
});
</script>
