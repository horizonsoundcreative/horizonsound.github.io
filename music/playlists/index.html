<!-- ============================================================
     1. READ PLAYLIST ID FROM URL
============================================================ -->
<script>
  const params = new URLSearchParams(window.location.search);
  const playlistId = params.get("playlist_id");

  <script id="playlist-data" type="application/json">
    {{ site.data.collections.collections | jsonify }}
  </script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const playlistId = params.get("playlist_id");

    const raw = document.getElementById("playlist-data").textContent;
    window.playlists = JSON.parse(raw);
    window.playlist = window.playlists.find(p => p.playlist_id === playlistId);
  </script>
  window.playlist = window.playlists.find(p => p.playlist_id === playlistId);
</script>

<!-- ============================================================
     2. RENDER TITLE + DESCRIPTION
============================================================ -->
<h1 class="playlist-title">
  <script>document.write(window.playlist.title)</script>
</h1>

<p class="playlist-description">
  <script>document.write(window.playlist.description)</script>
</p>

<!-- ============================================================
     3. VIEWER CONTAINER
============================================================ -->
<div id="viewer"></div>

<!-- ============================================================
     4. BUILD SONG OBJECTS (FEED + OVERRIDES)
============================================================ -->
<script>
  const feed = {{ site.data.youtube_feed.songs | jsonify }};
  const overrides = {{ site.data.music_overrides.overrides | jsonify }};

  window.allSongs = window.playlist.songs.map(id => {
    const base = feed.find(s => s.song_id === id);
    const override = overrides.find(o => o.song_id === id);
    return override ? { ...base, ...override } : base;
  });
</script>

<!-- ============================================================
     5. YOUTUBE EMBED FUNCTION
============================================================ -->
<script>
function loadViewer(song) {
  const viewer = document.getElementById('viewer');

  viewer.innerHTML = `
    <iframe
      class="video-embed"
      width="100%"
      height="360"
      src="https://www.youtube.com/embed/${song.youtube_id}"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen
    ></iframe>
  `;
}
</script>

<!-- ============================================================
     6. INITIALIZE VIEWER
============================================================ -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  if (!window.allSongs || window.allSongs.length === 0) {
    console.error("No songs found for playlist.");
    return;
  }

  loadViewer(window.allSongs[0]);
});
</script>
