     <p>[Intro]
     Raise a glass…
     To every long day
     That got us here.</p>
     <p>[Verse 1]
     We’ve been battered,
     We’ve been bruised,
     We’ve been running on fumes.
     We’ve been overworked and silent,
     We’ve been screaming in our heads.
     But somehow we’re still standing,
     Even when the week got tough —
     Guess the world can try to break us,
