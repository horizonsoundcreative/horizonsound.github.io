    description_html: >-
      <p>Official audio for "New Again" by Horizon Sound.</p><p>“New Again” is a
      high‑energy 90s‑inspired pop track driven by strong female vocals, pulsing
      rhythm, and a bold emotional edge. Bright synths, tight drums, and a
      confident melodic lift give the song its throwback punch, while modern pop
      production keeps everything crisp and cinematic. The verses carry a raw,
      sad honesty, building into a powerful, self‑reclaiming chorus that feels
      both nostalgic and fiercely new.</p><p>This song follows the story of
      someone finally breaking free from a love that kept letting her down.
      After one heartbreak too many, she rebuilds herself piece by piece —
      foundation, eyes, lips — transforming the mirror moment into a declaration
      of strength. A friend who always saw her worth steps forward, showing her
      the kind of love she deserved all along. With a soaring 90s‑pop chorus and
      a triumphant bridge, “New Again” captures the moment she chooses herself,
      steps into her power, and refuses to look back.</p><ul
      class="vibe-list"><li>🎧 Vibe: 90s pop revival, high‑energy, emotional,
