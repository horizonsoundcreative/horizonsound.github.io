     <p><strong>Official audio for “Becoming Me” by Horizon Sound.</strong></p>
     <p>“Becoming Me” is a fast, upbeat emotional‑pop track with bright expressive female vocals, driving drums, rhythmic bass, shimmering synths, and clean guitar accents. It blends vulnerability with rising energy — quick airy verses, a tension‑lifting pre‑chorus, and a soaring chorus layered with harmonies. The song builds toward a long, swelling instrumental bridge before the final chorus, ending with a clear, satisfying resolution.</p>
     <p>This track explores what it feels like to finally let someone in — to be seen, chosen, and transformed by love. Romantic, tender, and full of momentum, “Becoming Me” captures the moment when desire becomes trust and vulnerability becomes strength.</p>
     <p>🎧 <strong>Vibe:</strong> emotional pop, romantic, bright, energetic
     🎤 <strong>Vocals:</strong> expressive female lead with layered harmonies
     🎹 <strong>Production:</strong> shimmering synths, driving drums, clean guitar, rising dynamics
     🌅 <strong>Mood:</strong> vulnerable, hopeful, intimate, cinematic</p>
   lyrics_html: |
     <p>[Verse 1]
     I’ve been wandering through the city with a secret in my smile,
     I let strangers think they know me while I’m guarded deep inside.
     I’ve been dancing with my shadows, learning what my heart still hides,
     And every road I follow somehow leads me back to you.
     You saw past all the glitter, past the laughter and the noise,
     You touched the quiet part of me that rarely finds a voice.
     And suddenly I’m open, like a window in July,
     Letting in the tender warmth that rises when you meet my eyes.</p>
     <p>[Pre‑Chorus]
     I never knew desire could feel so gentle, could feel so right,
     But you hold me like a promise in the middle of the night</p>
     <p>[Chorus]
     Now the boys want me ’cause I’m young and pretty,
     But you’re the one that I have my eyes on.
     And when you whisper what you want from me,
     I’ll take you in, I’ll open willingly.
     I’m reaching out for something real and lasting,
     Hoping you’ll be the one who finally chooses me.</p>
     <p>[Verse 2]
     I’m learning how to breathe again with you here by my side,
     I’m letting all my defenses fall, I’m letting someone in this time.
     You trace the edges of my fears and turn them into light,
     You make the whole world softer now, you make the broken right.
     And every time you touch me, something deeper comes awake,
     A hunger wrapped in tenderness, a sweetness in the ache.
     I never thought I’d find this — something wild, something true,
     But every part of me is singing when I’m lying next to you.</p>
     <p>[Pre‑Chorus]
     I never knew becoming me could feel this easy, feel this free,
     But you show me every moment what it means to really be.</p>
     <p>[Chorus]
     Now the boys want me ’cause I’m young and pretty,
     But you’re the one that I have my eyes on.
     And when you whisper what you want from me,
     I’ll take you in, I’ll open willingly.
     I feel your love unfold in every moment —
     You’re the one who showed me what my heart could be.</p>
     <p>[Bridge]
     Take me where the night is warm and no one else can see,
     Where the world is just your heartbeat and the way you move with me.
     Let the moonlight paint my shoulders, let your hands rewrite my past,
     Let me fall into the future where this feeling always lasts.</p>
     <p>[Pre‑Chorus]
     I’m not afraid of wanting you — I’m only scared of time,
     ’Cause every second that I’m with you feels like something so divine.
     If this is what becoming is, then let me lose control,
     Let me give you every secret, every shadow of my soul.</p>
     <p>[Chorus]
     Now the boys want me ’cause I’m young and pretty,
     But you’re the one that I have my eyes on.
     And when you whisper what you want from me,
     I’ll take you in, I’ll open willingly.
     I’m giving you the love you always sparked in me —
     Every part of who I am is yours completely.</p>
     <p>[Outro]
     (Now the boys want me ’cause I’m young and pretty,
     But you’re the one that I have my eyes on.)
     (Now the world sees me, but you’re the one I’m keeping.)
     (Now the boys want me, but you’re the one I’m choosing.)</p>
