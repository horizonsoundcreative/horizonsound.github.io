  title: >-
    6. Half of Me – Performed by Lydia Ellington (After the Silence) | Horizon
    Sound
  description: >-
    Official audio for “Half of Me” by Horizon Sound.


    “Half of Me” is an empowering emotional pop ballad built on warm expressive
    female vocals, bold piano, rising strings, steady drums, and a cinematic
    lift that grows stronger with every chorus. It’s a self‑reclaiming anthem —
    the moment someone stops shrinking themselves to fit inside someone else’s
    expectations.


    The song follows a woman who softened her edges, quieted her voice, and
    reshaped herself to keep a love that never saw her fully. She bent until she
    broke, losing the person she used to be. But as she rebuilds, she discovers
    the fire she buried deep inside — the part of her that refuses to stay
    small. “Half of Me” is the sound of taking back space, rediscovering
    strength, and choosing authenticity over approval.


    🎧 Vibe: rising, bold, emotional

    🎤 Vocals: warm female lead, expressive phrasing, powerful lift

    🎛️ Production: piano, warm strings, steady drums, cinematic rise

    ⚡ Mood: empowering, self‑reclaiming, triumphant


