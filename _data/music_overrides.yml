      ‘Cause someone heard me talkin’,
      and they didn’t like the sound.
      Stools start slidin’ backward,
      and the room starts gatherin’ ’round.</p>
      <p>[Chorus]
      Met you in the middle of a barroom brawl,
      Dodgin’ fists and breakin’ falls—
      If that ain’t love, hell, I don’t know what is.
