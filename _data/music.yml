   description_html: |
     <p><strong>Official audio for “If You’d Asked” by Horizon Sound.</strong></p>
     <p>“If You’d Asked” is a slow, aching emotional pop ballad shaped by warm expressive female vocals, soft piano, warm strings, subtle drums, and spacious reverb. It carries the weight of regret — the heartbreak of a love that ended not with a fight, but with silence.</p>
     <p>The song tells the story of someone who would have stayed, fought, rebuilt, and tried again… if only the other person had asked. She had answers ready for questions that never came, hope ready for a chance that never arrived. Instead, the door closed quietly, leaving her with all the words she never got to say. “If You’d Asked” captures the pain of unspoken love and the ache of a goodbye that didn’t have to happen.</p>
     <p>🎧 <strong>Vibe:</strong> slow, cinematic, emotional
     🎤 <strong>Vocals:</strong> warm female lead, intimate delivery, aching tone
     🎛️ <strong>Production:</strong> soft piano, warm strings, subtle drums, atmospheric reverb
