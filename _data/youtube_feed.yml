    12. Unsent Letters – Performed by Lydia Ellington (After the Silence) |
    Horizon Sound
  description: >-
    Official audio for “Unsent Letters” by Horizon Sound.


    “Unsent Letters” is an intimate, confessional emotional pop ballad built
    around warm expressive female vocals, soft piano, gentle strings, airy pads,
    and spacious reverb. It carries the late‑night quiet of someone pouring
    their heart onto the page — not to be read, but to finally be released.


    The song follows a woman who writes letter after letter to the person she
    lost, filling pages with the truths she never had the courage to say out
    loud. Some letters ache with longing, some with regret, and one — written to
    herself — becomes the first step toward healing. “Unsent Letters” captures
    the bittersweet ritual of writing to let go, the ache of unspoken words, and
    the quiet strength found in finally choosing yourself.


