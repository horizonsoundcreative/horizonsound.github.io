    title: Put You Down (Electro-Pop / Dance-Pop) - Horizon Sound
    description_html: >-
      <p>Official audio for "Put You Down" by Horizon Sound.</p><p>“Put You
      Down” is a wild, high‑voltage electro‑pop banger packed with fierce
      attitude, distorted synth bass, and chaotic late‑night party energy.
      Hard‑hitting dance‑pop drums, glitchy vocal chops, and swagger‑soaked
      talk‑sing vocals drive the track with rebellious, unfiltered confidence.
      Explosive production, neon‑soaked textures, and a gritty, in‑your‑face
      edge make this a full‑throttle dancefloor meltdown.</p><p>This song
      follows the story of someone who refuses to play small — a bold,
      unapologetic voice stepping into power, pushing boundaries, and daring
      someone to keep up. Sharp verses, a taunting chorus, and a fire‑lit bridge
