      <p>[Verse 1]
      This road's a lil' unsteady
      My bags are kinda heavy
      Weighed down with all the petty things I've held
      But I won't let it break me
      These cuts won't overtake me
      I know the road is long
      But I'll stay strong</p>
      <p>[Pre-chorus]
      'Cause I know that all this shit won't last forever
      I know there's something better
      I know I'm made for something more</p>
      <p>[Chorus]
      So hold on
      Hold on
      Hold on
      Hold on</p>
      <p>[Verse 2]
      This town has no more answers
      I'm losing all my chances
      Can't stay here waiting
      Standin' still too long
      I've gotta get to leavin'
      I know my heart is beatin'
      I've heard that if I stay
      It fades away</p>
      <p>[Prechorus]
      But I know that all this shit won't last forever
      I know there's something better
      I know I'm made for something more</p>
      <p>[Chorus]
      So hold on
      Hold on
      Hold on
      Hold on</p>
      <p>[Bridge]
      When the night gets colder
      And the weight pulls on your shoulder
      When the world feels like it’s crashing in again
      Take a breath and face it
      You’re stronger when you chase it
      Every ending is a place to start again</p>
      <p>[Chorus]
      So hold on
      Hold on
      You’re closer than you know now
      Don’t let the fear take hold now
      Hold on
      Hold on
      The hardest part is over
      You’re stepping into clover
      Hold on</p>

  - title: A Quiet Little Voice
    song_id: a-quiet-little-voice-emotional-pop-empowering-pop-horizon-sound
    subtitle: ''
    collection: null
    order: null
    extra_title: null
    extra_html: null
    lyrics_html: |
      <p>[Verse]
      In a crowded delivery room
      A nurse says to the new mother “Congratulations, It's a boy."
      But if they had been listening
      They would have heard her little voice saying
      "Mama, It's me. It's your daughter, the one you always wanted."
      It's been a journey to here, but she's here now
      Laying in your arms—
      A new beginning</p>
      <p>[Chorus]
      But it all began with that quiet little voice that always knew who she was
      And it was the courage to listen that got her here today</p>
      <p>[Verse]
      And that quiet little voice turned into hormones that slowly started to soften her features
      She began to see herself for the first time
      Her new reflection began to match her soul
      That quiet little voice was replaced with the confidence to speak up and be heard
      The confidence to finally say yes to the boy that she had been seeing and to love him fully
      To let herself be loved
      The quiet little voice turned into their loud declaration of love</p>
      <p>[Chorus]
      And that love turned into an engagement
      And the engagement will turn into a marriage
      And one day
      That marriage will bring forth new life</p>
      <p>[Verse]
      In a crowded delivery room
      A nurse will say to her
      "Congratulations
      It's a girl."
      But she'll already know
      Because she learned a long time ago to always listen to that quiet little voice
      Because it was that voice that knew the whole time
      And it was that voice that got her here today</p>
      <p>[Outro]
      A new beginning</p>
  - title: Choosing Me (His Version)
    song_id: choosing-me-his-version-pop-horizon-sound
    subtitle: A Way Back | Part 3
    collection: a-way-back
    order: 3
    extra_title: null
    extra_html: null
    lyrics_html: |
      <p>[Intro]
      We gave it all, but sometimes love just fades,
      Two honest hearts walking different ways.
      No hard feelings, just a quiet truth—
      Now we’re learning how to start brand new.</p>
      <p>[Verse 1]
      Woke up slower, silence hanging in the room,
      Trying to make peace with the things I can’t undo.
      Realized I took us for granted on the way—
      Now I’m learning how to face myself today.</p>
      <p>[Pre Chorus]
      I’m not holding onto what we couldn’t save,
      Just thinking ’bout the times I wasn’t there.
      A little space, a little honesty—
      And I’m feeling more like me.</p>
      <p>[Chorus]
      I’m opening up, changing priorities,
      Learning to see what others need.
      I’m choosing me tonight.
      (I’m choosing me tonight.)
      No hard feelings, just a little more truth—
      For me to change, I’ve got to grow.
      Yeah, I’m— choosing me.</p>
      <p>[Verse 2]
      I’ve been feeling you every place I go,
      But it’s fading fast as I learn to grow.
      I’m still haunted, but I can see the light,
      Didn’t expect this strength to feel so right.</p>
      <p>[Pre Chorus]
      It’s not about the love we couldn’t keep,
      It’s learning to be the man I’m meant to be.
      A little truth, a little clarity—
      And I’m slowly finding my way back to me.</p>
      <p>[Chorus]
      I’m opening up, changing priorities,
      Learning to see what others need.
      I’m choosing me tonight.
      (I’m choosing me tonight.)
      No hard feelings, just a little more truth—
      For me to change, I’ve got to grow.
      Yeah, I’m— choosing me.</p>
      <p>[Bridge]
      I wasn’t there in the ways I meant to be,
      But I understand now why I pulled away.
      Got a little wiser, got a little light—
      And I’m leaning in to what feels right.</p>
      <p>[Chorus]
      I’m opening up, changing priorities,
      Learning to see what others need.
      I’m choosing me tonight.
      (I’m choosing me tonight.)
      No hard feelings, just a little more truth—
      For me to change, I’ve got to grow.
      Yeah, I’m choosing me tonight.
      I’m— choosing me.</p>
      <p>[Outro]
      We’re moving on, and maybe that’s alright,
      Two honest hearts stepping into new light.
      No hard feelings, just a quiet release—
      And we’re both finding our own kind of peace.</p>
