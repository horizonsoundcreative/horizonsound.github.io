     <p><strong>Official audio for “Oh, Amber” by Horizon Sound.</strong></p>
     <p>“Oh, Amber” is a nostalgic emotional‑pop story built on warm acoustic textures, gentle piano, light drums, and a swelling, heartfelt chorus. Clear, expressive female vocals carry the song from soft, intimate verses into a cinematic, rhythmic release. Modern pop production blends with subtle country‑pop influence to create a glowing, memory‑soaked atmosphere.</p>
     <p>This song follows the lifelong bond between a girl and her beagle, Amber — her first forever friend, her comfort through growing pains, and the heartbeat that shaped her childhood. From winter nights and school‑day crushes to college distance and the ache of letting go, the story traces how Amber’s presence became the rhythm of her life. The final verse introduces Aria, a new pup who brings healing and hope, carrying forward the love Amber left behind. Tender, emotional, and deeply human, “Oh, Amber” is a tribute to the pets who raise us, steady us, and stay with us long after they’re gone.</p>
     <p>🎧 <strong>Vibe:</strong> emotional pop, nostalgic, acoustic‑leaning, cinematic
     🎤 <strong>Vocals:</strong> warm female lead, expressive phrasing, heartfelt delivery
     🎛️ <strong>Production:</strong> acoustic guitar, soft piano, light drums, subtle country‑pop color, swelling chorus
     ⚡ <strong>Mood:</strong> tender, bittersweet, comforting, reflective</p>
   lyrics_html: |
     <p>[Verse 1]
     I was twelve with a wish on a winter night,
     Snowflakes dancing in the Christmas lights.
     I found a beagle pup with a ribbon on her ear,
     My heart beat fast like finally, she’s here.
     Named her Amber for the warmth in her eyes,
     Two little shadows in the winter night,
     Growing up felt big, but she made it light,
     Her soft footsteps made the world feel right.</p>
     <p>[Pre Chorus]
     Through every change, every stumble I pushed through,
     Amber was the one thing I could always turn to.</p>
     <p>[Chorus]
     Oh, Amber, you were my first forever,
     Running through the seasons like a wild heartbeat.
     Oh, Amber, we grew up together,
     Every memory glowing in your soft‑brown eyes,
     And the world kept changing, but you stayed you—
     The rhythm in my life I always ran back to. Amber…
     I never knew how much of me was you.</p>
     <p>[Verse 2]
     High school halls and a brand‑new crush,
     First slow dance, first kiss, first rush.
     He held my hand, but you held my truth,
     Teaching me love the way you taught me youth.
     Then college came with its miles and fears,
     Quiet dorm rooms and long‑distance tears.
     But every break I’d run home wanting more,
     To find you waiting on the kitchen floor.</p>
     <p>[Pre Chorus]
     Your muzzle graying, but your tail still wagging,
     Like every bit of strength you had was meant for me.</p>
     <p>[Chorus]
     Oh, Amber, you were my first forever,
     Running through the seasons like a wild heartbeat.
     Oh, Amber, we grew up together,
     Every memory glowing in your soft‑brown eyes,
     And the world kept changing, but you stayed you—
     The rhythm in my life I always ran back to. Amber…
     I never knew how much of me was you.</p>
     <p>[Bridge]
     I held you close on that quiet night,
     Whispered “thank you” through the fading light.
     And when the morning came, the house felt wrong—
     Too still, too quiet, missing your warmth.
     I didn’t know how to breathe without you,
     Didn’t know how to start something new.</p>
     <p>[Verse 3]
     Then he showed up with a trembling bow,
     Little beagle eyes saying “it’s okay to let go.”
     Placed her gently in my shaking arms,
     A tiny heartbeat stitching up the old scars,
     Named her Aria for the light she sparked,
     A soft little promise that love never fades.</p>
     <p>[Chorus]
     Oh, Amber, you were my first forever,
     Running through the seasons like a wild heartbeat.
     Oh, Amber, we grew up together,
     Every memory glowing in your soft‑brown eyes.
     And Aria, you’re the love that follows,
     Filling up the spaces where the grief still pools.
     Two beagle pups in the story I knew—
     Amber taught me love, and Aria carries it through.
     Amber… I’ll always be all the love you left in me.</p>
