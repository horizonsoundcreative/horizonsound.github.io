     <p><strong>Official audio for “The Dress I Never Wore” by Horizon Sound.</strong></p>
     <p>“The Dress I Never Wore” is a slow, aching emotional pop ballad shaped by warm expressive female vocals, soft piano, warm strings, light drums, and airy pads. It carries the weight of lost futures — the dreams built around someone who walked away, and the quiet strength it takes to reclaim your identity afterward.</p>
     <p>The song follows a woman standing in front of a wedding dress that represents everything she once believed in: vows, forever, a life she planned down to the smallest detail. When the relationship ends, she’s left holding a symbol of a future that never came. “The Dress I Never Wore” captures the heartbreak of letting go, the courage of rediscovery, and the moment she begins to see herself clearly again.</p>
     <p>🎧 <strong>Vibe:</strong> slow, emotional, cinematic
     🎤 <strong>Vocals:</strong> warm female lead, smooth vibrato, intimate delivery
     🎛️ <strong>Production:</strong> soft piano, warm strings, light drums, airy pads
     ⚡ <strong>Mood:</strong> reflective, tender, bittersweet</p>
   lyrics_html: |
     <p>[Intro]
     It’s hanging in the closet
     My promise made in white</p>
     <p>[Verse 1]
     I’ve tried it on a thousand times,
     Just to see how it would feel.
     I dreamed of walking towards forever,
     Down the aisle to stand with you.
     You said love was made for moments,
     But I planned a whole life long.
     Now I’m left holding a dress
     I may never get the chance to wear.</p>
     <p>[Pre Chorus]
     And every stitch reminds me
     Of the girl I used to be.</p>
     <p>[Chorus]
     This is the dress I never wore —
     All the vows, all the dreams hanging by a thread.
     Every satin‑lined hope I saved
     For a love that wouldn’t last.
     You walked out and closed the door,
     Left me holding a fading dream.
     Now I’m learning who I am
     Without the dress I never wore.</p>
     <p>[Verse 2]
     I pictured names we’d give our children,
     Holidays and quiet nights.
     I built a world around your presence,
     Never saw the warning signs.
     Now the fabric feels brittle,
     Like it’s showing the truth —
     That I loved the life I dreamed of
     More than I ever loved you.</p>
     <p>[Pre Chorus]
     And the mirror shows a woman
     Who survived what she never saw coming.</p>
     <p>[Chorus]
     This is the dress I never wore —
     All the vows, all the dreams hanging by a thread.
     Every satin‑lined hope I saved
     For a love that wouldn’t last.
     You walked out and closed the door,
     Left me holding a fading dream.
     Now I’m learning who I am
     Without the dress I never wore.</p>
     <p>[Bridge]
     One day I’ll take it from the hanger,
     Lay it gently on the bed.
     Say goodbye to all the futures
     I don’t need anymore.
     I’ll keep the strength it gave me,
     But let the rest fall away —</p>
     <p>[Chorus]
     This is the dress I never wore —
     All the vows, all the dreams hanging by a thread.
     Every satin‑lined hope I saved
     For a love that wouldn’t last.
     You walked out and closed the door,
     Left me holding a fading dream.
     Now I’m learning who I am
     Without the dress I never wore.</p>
     <p>[Outro]
     I close the door…
     And walk away.</p>
