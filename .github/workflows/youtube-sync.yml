name: YouTube Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --prefix youtube-sync

      - name: Run YouTube sync generator
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          REDIRECT_URI: ${{ secrets.REDIRECT_URI }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: node youtube-sync/generate-youtube-feedx.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add _data/ || true
          git add assets/thumbnails/ || true
          git add _playlists/ || true
          git commit -m "Automated YouTube sync" || echo "No changes to commit"
          git push || echo "No changes to push"

  notify-on-failure:
    needs: sync
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send SMS alert via Twilio
        uses: twilio-labs/actions-sms@v1
        with:
          fromPhoneNumber: ${{ secrets.TWILIO_FROM_NUMBER }}
          toPhoneNumber: "+19189263051"
          message: "YouTube Sync FAILED. Check GitHub Actions."
          accountSid: ${{ secrets.TWILIO_ACCOUNT_SID }}
          authToken: ${{ secrets.TWILIO_AUTH_TOKEN }}
