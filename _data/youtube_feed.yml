    description_html: >-
      <p>Official audio for "Bottle on the Table" by Horizon
      Sound.</p><p>“Bottle on the Table” is a classic 1950s country‑western
      ballad steeped in heartbreak, dusty barroom atmosphere, and old‑school
      storytelling. Recorded in a warm mono style with tube‑mic character, light
      tape hiss, and a dry room sound, the track captures the raw simplicity of
      early country. A baritone male vocal leads the way with a weary, lived‑in
      tone, supported by gentle cowboy‑strum rhythm guitar, mournful steel
      guitar, upright bass, and a slow western‑swing pulse. The production leans
      fully into the Hank Williams / Marty Robbins era — no modern polish, just
      pure vintage emotion.</p><p>This song tells the story of a man left behind
      by the woman he loved — and betrayed by the friend she rode away with.
      Alone with a bottle, a jukebox, and the echo of memories he can’t outrun,
