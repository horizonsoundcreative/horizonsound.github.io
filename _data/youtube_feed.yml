    title: Wildfire (Modern Country Power Anthem) – Horizon Sound
    description_html: >-
      <p>Official audio for “Wildfire” by Horizon Sound.</p><p>“Wildfire” is a
      fierce, modern‑country power anthem driven by bold female vocals, big
      drums, electric guitars, and a cinematic, high‑octane lift. The track
      captures the unstoppable force of a woman who refuses to be tamed — a
      storm of fire, fury, and resilience rising against someone who tried to
      break her. With its explosive chorus, dramatic pre‑chorus, and confident
      Nashville production, “Wildfire” delivers the heat of a woman reclaiming
      her strength and burning brighter than ever.</p><p>This song tells the
      story of a woman who’s been underestimated for the last time. Born with
      lightning under her skin, she finally breaks free — hitting the highway,
      windows down, hair flying in the Oklahoma wind. Every mile fuels her fire,
      turning her into a force of nature no one can outrun. With smoke on the
      horizon and power in her stride, she rises, fights, and refuses to be
      confined. “Wildfire” is her anthem — fierce, fearless, and burning hot
      tonight.</p><ul class="vibe-list"><li>🎧 Vibe: fierce, empowering, modern
      country, cinematic</li><li>🎤 Vocals: bold female lead, emotional grit,
