    youtube_id: ii7gqcUMto4
    title: Not so Smart Home (Folk‑Country Comedy) - Horizon Sound
    description_html: >-
      <p>Official audio for “Not So Smart Home” by Horizon Sound.</p><p>“Not So
      Smart Home” is an upbeat, humorous folk‑country romp packed with playful
      acoustic guitar, light percussion, and a bouncy, mischievous groove. A
      charismatic male vocal delivers every line with crisp diction and
      expressive comedic timing, bringing the chaos of malfunctioning gadgets to
      life. Bright, warm production and subtle tech‑y sound effects — beeps,
      clicks, digital quirks — add a modern twist to the classic storytelling
      style.</p><p>This song follows a man slowly losing control of his own
      “smart” home as every device develops a mind of its own. From a sassy
      thermostat to a rebellious vacuum to a toaster with terrible timing, the
      house becomes a full‑blown circus of uncooperative tech. With its
      conversational phrasing, natural pauses, and slightly exasperated charm,
      “Not So Smart Home” is a lighthearted anthem for anyone who’s ever argued
      with their appliances.</p><ul class="vibe-list"><li>🎧 Vibe: upbeat
      folk‑country, playful, mischievous, energetic</li><li>🎤 Vocals:
      expressive male lead, comedic timing, crisp delivery</li><li>🎛️
      Production: acoustic guitar, light percussion, subtle tech sound effects,
      warm mix</li><li>⚡ Mood: fun, chaotic, exasperated,
