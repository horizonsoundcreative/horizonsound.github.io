  - playlist_id: missing-stamp-venice-trilogy
    is_collection: true
    title: "Venice Trilogy - Missing Stamp"
    subtitle: 
    description: >
      A three‑chapter journey through memory, longing, and the magic of a city that 
      changes everything. The Venice Trilogy follows two lifelong friends as a single 
      trip blurs the line between nostalgia and possibility. From the quiet hope of 
      “Someday,” to the heartbreak and distance of “Missing Stamp,” and finally to 
      the sun‑drenched release of “Venice Waters,” this collection traces the moment 
      a friendship becomes a story worth remembering—and maybe worth returning to.
    thumbnail: /assets/thumbnails/playlist-venice-trilogy-missing-stamp.jpeg
    hero: /assets/thumbnails/playlist-hero-venice-trilogy.jpeg
    songs:
      - someday-acoustic-pop-storytelling-horizon-sound
      - missing-stamp-emotional-acoustic-pop-horizon-sound
      - venice-waters-upbeat-acoustic-pop-adventure-horizon-sound
    order: 4
  
