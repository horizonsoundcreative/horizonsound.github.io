   description_html: |
     <p><strong>Official audio for “Not So Smart Home” by Horizon Sound.</strong></p>
     <p>“Not So Smart Home” is an upbeat, humorous folk‑country romp packed with playful acoustic guitar, light percussion, and a bouncy, mischievous groove. A charismatic male vocal delivers every line with crisp diction and expressive comedic timing, bringing the chaos of malfunctioning gadgets to life. Bright, warm production and subtle tech‑y sound effects — beeps, clicks, digital quirks — add a modern twist to the classic storytelling style.</p>
     <p>This song follows a man slowly losing control of his own “smart” home as every device develops a mind of its own. From a sassy thermostat to a rebellious vacuum to a toaster with terrible timing, the house becomes a full‑blown circus of uncooperative tech. With its conversational phrasing, natural pauses, and slightly exasperated charm, “Not So Smart Home” is a lighthearted anthem for anyone who’s ever argued with their appliances.</p>
     <p>🎧 <strong>Vibe:</strong> upbeat folk‑country, playful, mischievous, energetic
     🎤 <strong>Vocals:</strong> expressive male lead, comedic timing, crisp delivery
     🎛️ <strong>Production:</strong> acoustic guitar, light percussion, subtle tech sound effects, warm mix
     ⚡ <strong>Mood:</strong> fun, chaotic, exasperated, clever</p>
   lyrics_html: |
     <p>[Intro]
     I swear I used to run this place—
     Now my smart home thinks I’m the issue.</p>
     <p>[Verse 1]
     Woke up this morning freezing, windows open wide,
     Thermostat at fifty‑eight like it’s plotting homicide.
     It said, “I noticed you like wearing sweaters,”—
     Great—
     Guess that’s what I get for skipping the “brains‑included” update.
     Now my house thinks it’s clever in the worst kind of way,
     Throwing shade through the speakers ’cause it’s got plenty to say.
     If I wanted attitude, I’d date an ex‑girlfriend—
     Not a thermostat with delusions of being my friend.</p>
     <p>[Pre‑Chorus]
     Maybe I’m tired, maybe I’m stressed,
     Maybe my house just needs a rest…
     But every time I give a simple command,
     It does the opposite like it’s got the upper hand.</p>
     <p>[Chorus]
     My smart home keeps gaslighting me,
     Every single gadget’s smart but they don’t agree.
     Doors unlock, then lock again “for my security,”
     Yeah, my smart home won’t stop gaslighting me—
     Should’ve paid for the package where they share the same brain— maybe.</p>
     <p>[Verse 2]
     The robot vacuum’s ramming my feet, itching to start a fight,
     And the toaster popped at 2 a.m. to ruin my night.
     My TV recommends shows I swear I’ve never seen,
     While the fridge keeps nagging, “Have you tried eating your greens?”
     Told the lights to turn off softly —
     they flickered like they’re mad I dared to speak,
     And my smart speaker keeps insisting that my name is “Dominique.”
     Every gadget’s smart alone, but together they’re a fever dream—
     Should’ve paid for the upgrade that lets them share one brain‑stream.</p>
     <p>[Pre‑Chorus]
     They’re brilliant alone but together unglued,
     The microwave beeped twice like it’s joining the feud.
     Feels like all my smart tech’s suddenly unified—
     And I’m losing every battle on the techie side.</p>
     <p>[Chorus]
     My smart home keeps gaslighting me,
     Playing mind games with my electricity.
     It says, “I’m here to help,” but laughs digitally,
     Yeah, my smart home won’t stop gaslighting me—
     ’Cause I skipped the upgrade that lets them think collectively.</p>
     <p>[Bridge]
     Maybe I should move out, find a cabin in the woods,
     Someplace where the only thing that judges me is the local wildlife.
     But when I said, “I’m leaving,” every speaker in the house replied,
     “I didn’t quite catch that, Dominique?” in a tone too sweet to mean anything good.</p>
     <p>[Final Chorus]
     My smart home keeps gaslighting me,
     Running this whole circus with inefficiency.
     Every switch and sensor’s smart but not collectively,
     Yeah, my smart home won’t stop gaslighting me—
     Fine!— you win, you smug pile of circuitry.</p>
     <p>[Outro]
     “Siri, play something calming…”
     “Playing Highway to Hell.”—
     At this point, I should have expected that.</p>
 - title: "Nineteen Summers Revised"
   song_id: "nineteen-summers-revised"
   subtitle: ""
   youtube_id: "r16qSkxEcI4"
   url: "/music/nineteen-summers-revised/"
   image: "/assets/Nineteen Summers New.jpeg"
   videostatus: "Private"
   primary_playlist: "Emotional Ballads"
   description_html: |
     <p><strong>Official audio for “Nineteen Summers” by Horizon Sound.</strong></p>
     <p>“Nineteen Summers” is a warm acoustic‑pop track filled with emotional storytelling, nostalgic imagery, and a bittersweet, heartfelt tone. Bright acoustic guitars, clean electric accents, crisp pop‑country drums, and intimate vocals create a polished, Nashville‑influenced sound. The song builds from quiet, reflective verses into soaring, harmony‑rich choruses, with subtle mandolin or banjo textures and a wide, cinematic stereo mix.</p>
     <p>This song tells the story of a young woman facing a shortened timeline — and choosing to fill her remaining days with courage, joy, and meaning. It’s a tribute to the way a single life can touch countless others, and how love, memory, and connection can outlive even the shortest time on earth. Emotional, uplifting, and deeply human, “Nineteen Summers” honors the beauty of a life lived fully.</p>
     <p>🎧 <strong>Vibe:</strong> emotional acoustic‑pop, nostalgic, bittersweet, heartfelt
     🎤 <strong>Vocals:</strong> intimate, expressive, warm
     🎸 <strong>Production:</strong> acoustic guitars, clean electric accents, crisp drums, mandolin/banjo textures
     🌅 <strong>Mood:</strong> reflective, uplifting, tender</p>
   lyrics_html: |
     <p>[Verse 1]
     She grew up on a quiet street,
     Bare feet on July concrete,
     Laughin’ with her friends ’til the porch lights blinked,
     Dreamin’ bigger than her little town.
     First kiss in her boyfriend’s car,
     Heartbreak under midnight stars,
     She thought she had forever just to figure out
     What her life was all about.</p>
     <p>Then the headaches came like thunder,
     And the doctor’s voice went still.
     Six months written on a paper,
     Left her dreams unfulfilled.</p>
     <p>[Pre‑Chorus]
     She cried for maybe half a day,
     Then wiped her tears and said, “Okay…
     If time is short, I’m gonna make it mine.”</p>
     <p>[Chorus]
     ’Cause she had nineteen summers
     And a heart that burned like fire,
     A list of dreams she’d treasured
     In a notebook by her bedside.
     She said, “If I’m leaving early,
     Then I’m leaving something real.
     I don’t want to be forgotten
     Like I was never here.”
     But every life she touched
     Held her tighter in the end…
     And she learned she’d live forever
     In the hearts of all her friends.</p>
     <p>[Verse 2]
     She drove to see the ocean waves,
     Let the salt wind take her breath away,
     Screamed her name into the rising tide
     Just to hear the waves rush back.
     She skydived from a cloudless sky,
     Felt the rush of being truly alive,
     Bought a concert ticket to her favorite star
     And sang every line with a heart laid bare.</p>
     <p>But the hardest thing she ever did
     Was write those letters late at night—
     Words for when she wouldn’t be there,
     Pen trembling in the soft light.</p>
     <p>[Pre‑Chorus]
     She sealed them with a shaky hand,
     Said, “Promise me you’ll understand…
     I’m scared you’ll all forget me when I’m gone.”</p>
     <p>[Chorus]
     But she had nineteen summers
     And a love that didn’t fade,
     The smile she got from her mother
     Shining bright through all her days.
     She said, “If I’m leaving early,
     Then I’m leaving something real.
     I don’t want to be forgotten
     Like I was never here.”
     But every tear she cried
     Was a glimpse of who she’d been inside…
     And she learned she’d live forever
     In the hearts of all her friends.</p>
     <p>[Bridge]
     And on her final morning
     With the sunrise on her skin,
     She whispered, “I’m not frightened now…
     I’ve made peace with how it ends.”
     ’Cause every hand she held
     And every memory she made
     Was proof she’d never vanish
     When her heartbeat slipped away.</p>
     <p>[Chorus]
     She had nineteen summers
     But she filled them like a hundred,
     Turned six months into a lifetime
     With the courage that she carried.
     She said, “If I’m leaving early,
     Then I’m leaving something real.
     I don’t want to be forgotten
     Like I was never here.”
     But the love she left behind
     Was a flame that never dimmed…
     And she passed on knowing fully
     She would live through all of them.</p>
     <p>[Outro]
     Nineteen summers,
     But her story never ends.
     She’s a whisper in the ocean,
     She’s the love inside their hearts.
     And every life she touched
     Reflects the girl she used to be…
     So she lives on—
     In the hearts of all her friends.</p>
