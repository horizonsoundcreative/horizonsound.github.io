     <p><strong>Official audio for “Time Capsule” by Horizon Sound.</strong></p>
     <p>“Time Capsule” is a warm, nostalgic storytelling track built around acoustic textures, soft pop production, and an intimate male vocal. The song blends gentle guitars, subtle percussion, and a reflective melodic lift to create a cinematic, memory‑soaked atmosphere. It’s tender, observational, and deeply human — a quiet moment that turns into something life‑changing.</p>
     <p>The song follows a couple returning to her childhood home after her dad takes a fall. While she helps her parents around the farm, he’s sent upstairs to wait in her old bedroom — a space frozen in time. As he looks around, he discovers pieces of the girl she used to be: cheer ribbons, a homecoming crown, a debate trophy, worn‑out posters, a keyboard with years of fingerprints, and a corkboard full of memories she never mentioned. Each object reveals a side of her he never knew, deepening his understanding of who she was and who she’s become.</p>
     <p>When she walks in and sees him taking it all in, she’s embarrassed — but he’s moved. The room becomes a bridge between past and present, showing him the full picture of the woman he loves. With a heartfelt chorus and a quietly emotional final verse, “Time Capsule” captures the moment someone realizes they’re falling in love all over again, simply by seeing the history that shaped her.</p>
     <p>🎧 <strong>Vibe:</strong> nostalgic, warm, emotional, reflective
     🎤 <strong>Vocals:</strong> intimate male lead, soft delivery, storytelling tone
     🎛️ <strong>Production:</strong> acoustic foundation, gentle pop elements, subtle cinematic lift
     ⚡ <strong>Mood:</strong> tender, memory‑rich, quietly romantic, heartfelt</p>
   lyrics_html: |
     <p>[Intro]
     Her dad took a fall but he’s okay,
     And her mom could use a hand around the farm.</p>
     <p>[Verse 1]
     So we packed a bag and hit the road,
     Just took enough for a four‑day stay.
     She pointed out the landmarks in her town,
     And the white farmhouse glowing in the late‑day sun.
     When we pulled into that gravel drive,
     I felt her shoulders start to unwind—
     Like coming home unlocked a part of her
     She didn’t know she’d missed—</p>
     <p>[Pre Chorus]
     Her mama thanked me for the help
     And pulled her aside for a moment.
     She squeezed my hand and whispered,
     “You can wait for me up in my room—
     Second door on the left.”</p>
     <p>[Chorus]
     Her old room’s a time capsule,
     Full of memories she never knew she kept.
     Little notes and worn‑out pictures
     Of the girl she was before she left.
     And I swear I fell for her again
     In that quiet, dusty place—
     That old time capsule showed the girl
     She was before she ever loved me.</p>
     <p>[Verse 2]
     There were cheer ribbons on the mirror frame,
     And a crown from when she won homecoming queen.
     Beside it sat her debate trophy,
     A sign she’d been deeper than I ever even knew.
     Boy‑band posters curling at the corners,
     And a keyboard with the keys worn down from years of use.
     A corkboard full of pictures of a boy
     Who must’ve been important in her world.</p>
     <p>[Pre Chorus]
     And I don’t know what to do with it now,
     All these pieces I can’t put down.
     Feels like something’s pulling me closer,
     And it’s changing how I see her now.</p>
     <p>[Chorus]
     Her old room’s a time capsule,
     Full of memories she never knew she kept.
     Little notes and worn‑out pictures
     Of the girl she was before she left.
     And I swear I fell for her again
     In that quiet, dusty place—
     That old time capsule showed the girl
     She was before she ever loved me.</p>
     <p>[Verse 3]
     She walked in and caught me smiling,
     And said, “Lord, I forgot all this was here.”
     Her face went red when she saw that corkboard,
     She laughed, a little flustered by it all.
     I said, “Hey, it’s okay — I like this side of you.”
     She shook her head and whispered, “I was just a kid…”
     But I saw the woman she’d become.</p>
     <p>[Pre Chorus]
     And I don’t know what to do with it now,
     All these pieces I can’t put down.
     Feels like something’s pulling me closer,
     And it’s changing how I see her now.</p>
     <p>[Chorus]
     Her old room’s a time capsule,
     Full of memories she never knew she kept.
     Little notes and worn‑out pictures
     Of the girl she was before she left.
     And I swear I fell for her again
     In that quiet, dusty place—
     That old time capsule showed the girl
     She was before she ever loved me.</p>
     <p>[Outro]
     Her dad took a fall but he’s okay,
     We’re headed back home, and I’m forever changed.</p>
